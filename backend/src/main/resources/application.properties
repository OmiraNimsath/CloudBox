# CloudBox — Node Configuration
# Override per instance: --server.port=8081 --cloudbox.node-id=2

spring.application.name=cloudbox

# Node identity (1-based; nodes 1–5 use ports 8080–8084)
server.port=8080
cloudbox.node-id=1

# File upload limit (100 MB)
spring.servlet.multipart.max-file-size=100MB
spring.servlet.multipart.max-request-size=100MB

# Local replica storage directory
cloudbox.storage.base-dir=./data/node-${cloudbox.node-id}

# ZooKeeper connection (used for leader election via ZAB)
spring.cloud.zookeeper.connect-string=localhost:2181
spring.cloud.zookeeper.config.enabled=false
spring.cloud.zookeeper.discovery.enabled=false

# Time synchronization
cloudbox.timesync.ntp-sync-interval=15000
cloudbox.timesync.clock-skew-threshold-ms=100
cloudbox.timesync.skew-check-interval=5000

# Suppress unnecessary Spring Cloud startup banners
spring.main.banner-mode=off
logging.level.org.apache.zookeeper=WARN
logging.level.org.apache.curator=WARN
logging.level.com.cloudbox=INFO
