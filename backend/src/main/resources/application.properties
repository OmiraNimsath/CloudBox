# ── CloudBox — Application Configuration ─────────────────────────

spring.application.name=cloudbox

# ── Node identity (override per instance: --server.port=8081 --cloudbox.node-id=2)
server.port=8080
cloudbox.node-id=1

# ── File upload limit (100 MB)
spring.servlet.multipart.max-file-size=100MB
spring.servlet.multipart.max-request-size=100MB

# ── Local file storage directory
cloudbox.storage.base-dir=./data/node-${cloudbox.node-id}

# ── ZooKeeper connection
spring.cloud.zookeeper.connect-string=localhost:2181

# ── ZooKeeper service discovery
spring.cloud.zookeeper.discovery.enabled=true
spring.cloud.zookeeper.discovery.root=/cloudbox/services
spring.cloud.zookeeper.discovery.instance-id=${spring.application.name}-${cloudbox.node-id}
spring.cloud.zookeeper.discovery.instance-port=${server.port}

# ── Disable config import for now (avoids startup failure when ZK is down)
spring.cloud.zookeeper.config.enabled=false

# ── Consensus & Agreement Configuration
cloudbox.leader-election-timeout=10000
cloudbox.heartbeat-interval=3000
cloudbox.partition-check-interval=5000

# ── Fault Tolerance Configuration
cloudbox.cluster-size=5
cloudbox.heartbeat-timeout=15000
cloudbox.max-recovery-retries=3

# ── Replication controls (single source of truth)
cloudbox.replication.quorum-size=3
cloudbox.replication.write-timeout=30s
cloudbox.replication.retry-count=3
cloudbox.replication.replication-factor=5

# ── Backward-compatible aliases for existing @Value bindings
cloudbox.quorum-size=${cloudbox.replication.quorum-size}
cloudbox.replication-factor=${cloudbox.replication.replication-factor}

# ── Time Synchronization Configuration
cloudbox.timesync.ntp-sync-interval=60s
cloudbox.timesync.clock-skew-threshold-ms=100
cloudbox.timesync.clock-read-timeout=5s
cloudbox.timesync.skew-check-interval=30s
cloudbox.timesync.enable-ntp=true
cloudbox.timesync.ntp-server=pool.ntp.org
cloudbox.timesync.clock-adjustment-strategy=gradual
